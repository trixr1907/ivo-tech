<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7f08e" />
      <stop offset="0.55" stop-color="#4caf50" />
      <stop offset="1" stop-color="#1b5e20" />
    </linearGradient>
    <linearGradient id="leafShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.36" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.14" />
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d6b28d" />
      <stop offset="1" stop-color="#7b573d" />
    </linearGradient>
    <linearGradient id="needleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5ef87" />
      <stop offset="1" stop-color="#2e7d32" />
    </linearGradient>
  </defs>

  <!-- Basil -->
  <g transform="translate(175 240)" opacity="0.98">
    <g id="leaf">
      <!-- Leaf body -->
      <path
        d="M 0 -78 C 55 -82 95 -34 95 0 C 95 34 55 82 0 78 C -55 82 -95 34 -95 0 C -95 -34 -55 -82 0 -78 Z"
        fill="url(#leafGrad)"
        stroke="#154a1b"
        stroke-opacity="0.28"
        stroke-width="6"
      />
      <!-- Midrib -->
      <path
        d="M 0 -64 C 10 -42 12 -6 0 64"
        fill="none"
        stroke="#0d3313"
        stroke-opacity="0.22"
        stroke-width="6"
        stroke-linecap="round"
      />
      <!-- Highlight -->
      <path
        d="M -10 -66 C 30 -70 70 -32 70 0 C 70 28 30 66 -10 62 C -35 64 -62 40 -62 8 C -62 -28 -38 -62 -10 -66 Z"
        fill="url(#leafShade)"
        opacity="0.32"
      />
    </g>

    <use href="#leaf" transform="translate(-12 -18) rotate(-22) scale(0.92)" />
    <use href="#leaf" transform="translate(-54 14) rotate(112) scale(0.70)" />
    <use href="#leaf" transform="translate(32 26) rotate(58) scale(0.78)" />
    <use href="#leaf" transform="translate(64 -24) rotate(18) scale(0.68)" />
  </g>

  <!-- Single small basil leaf -->
  <g transform="translate(310 110) rotate(-8)" opacity="0.98">
    <path
      d="M 0 -52 C 36 -54 60 -22 60 0 C 60 22 36 54 0 52 C -36 54 -60 22 -60 0 C -60 -22 -36 -54 0 -52 Z"
      fill="url(#leafGrad)"
      stroke="#154a1b"
      stroke-opacity="0.26"
      stroke-width="6"
    />
    <path
      d="M 0 -40 C 6 -24 6 -4 0 40"
      fill="none"
      stroke="#0d3313"
      stroke-opacity="0.20"
      stroke-width="6"
      stroke-linecap="round"
    />
    <path
      d="M -6 -44 C 20 -46 44 -22 44 0 C 44 20 18 44 -6 42 C -20 44 -42 28 -42 10 C -42 -18 -24 -42 -6 -44 Z"
      fill="url(#leafShade)"
      opacity="0.28"
    />
  </g>

  <!-- Rosemary -->
  <g transform="translate(322 300) rotate(18)" opacity="0.98">
    <!-- Stem -->
    <path
      d="M 0 130 C 10 92 24 60 38 20 C 52 -18 68 -58 96 -112"
      fill="none"
      stroke="url(#stemGrad)"
      stroke-width="12"
      stroke-linecap="round"
    />

    <!-- Needles -->
    <g fill="none" stroke="url(#needleGrad)" stroke-width="8" stroke-linecap="round" stroke-opacity="0.98">
      <path d="M 16 104 L -24 74" />
      <path d="M 22 88 L -20 56" />
      <path d="M 30 70 L -10 40" />
      <path d="M 36 52 L -2 20" />
      <path d="M 44 34 L 8 0" />
      <path d="M 52 14 L 20 -16" />
      <path d="M 62 -6 L 34 -44" />
      <path d="M 74 -30 L 52 -72" />
      <path d="M 88 -54 L 70 -96" />

      <path d="M 22 96 L 60 66" />
      <path d="M 30 78 L 70 48" />
      <path d="M 38 60 L 78 26" />
      <path d="M 46 42 L 86 10" />
      <path d="M 56 22 L 96 -6" />
      <path d="M 66 2 L 110 -22" />
      <path d="M 78 -22 L 124 -40" />
      <path d="M 92 -46 L 140 -64" />
    </g>
  </g>
</svg>

