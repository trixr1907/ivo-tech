<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">System Surface Hero Visual</title>
  <desc id="desc">Abstract dark tech surface with glowing network lines and layered product cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050912"/>
      <stop offset="0.55" stop-color="#0b1530"/>
      <stop offset="1" stop-color="#0b1224"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientTransform="translate(1180 170) rotate(27) scale(580 430)">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientTransform="translate(370 820) rotate(-12) scale(620 360)">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#38bdf8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1600" height="960" fill="url(#bg)"/>
  <rect width="1600" height="960" fill="url(#glowA)"/>
  <rect width="1600" height="960" fill="url(#glowB)"/>

  <g opacity="0.35">
    <path d="M120 690H1490" stroke="url(#line)" stroke-width="2"/>
    <path d="M120 610H1540" stroke="url(#line)" stroke-width="2"/>
    <path d="M170 530H1510" stroke="url(#line)" stroke-width="2"/>
    <path d="M200 450H1480" stroke="url(#line)" stroke-width="2"/>
  </g>

  <g filter="url(#soft)" opacity="0.45">
    <circle cx="545" cy="530" r="40" fill="#38bdf8"/>
    <circle cx="905" cy="486" r="34" fill="#22d3ee"/>
    <circle cx="1140" cy="360" r="36" fill="#818cf8"/>
  </g>

  <g transform="translate(460 220)">
    <rect x="0" y="0" width="740" height="420" rx="24" fill="#0b142a" fill-opacity="0.58" stroke="#334155" stroke-opacity="0.65"/>
    <rect x="30" y="34" width="255" height="10" rx="5" fill="#38bdf8" fill-opacity="0.82"/>
    <rect x="30" y="72" width="380" height="8" rx="4" fill="#94a3b8" fill-opacity="0.55"/>
    <rect x="30" y="95" width="325" height="8" rx="4" fill="#64748b" fill-opacity="0.55"/>

    <rect x="30" y="150" width="320" height="220" rx="16" fill="#0f1e3a" fill-opacity="0.9" stroke="#38bdf8" stroke-opacity="0.45"/>
    <path d="M54 330L115 266L177 289L252 230L326 245" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="326" cy="245" r="6" fill="#22d3ee"/>

    <rect x="380" y="150" width="330" height="92" rx="14" fill="#101f38" stroke="#475569" stroke-opacity="0.6"/>
    <rect x="400" y="174" width="130" height="8" rx="4" fill="#cbd5e1" fill-opacity="0.8"/>
    <rect x="400" y="193" width="245" height="7" rx="4" fill="#64748b" fill-opacity="0.8"/>

    <rect x="380" y="278" width="330" height="92" rx="14" fill="#101f38" stroke="#475569" stroke-opacity="0.6"/>
    <rect x="400" y="303" width="118" height="8" rx="4" fill="#a78bfa" fill-opacity="0.95"/>
    <rect x="400" y="322" width="232" height="7" rx="4" fill="#64748b" fill-opacity="0.8"/>
  </g>
</svg>
