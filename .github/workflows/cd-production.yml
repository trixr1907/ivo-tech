name: cd-production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch or sha) to deploy
        required: true
        default: main
        type: string
      skip_quality_gate_check:
        description: Skip required check validation (emergency only)
        required: false
        default: false
        type: boolean

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    environment:
      name: production
      url: https://ivo-tech.com
    permissions:
      contents: read
      deployments: write
      checks: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve target sha
        id: target
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for required quality checks on target commit
        if: ${{ !inputs.skip_quality_gate_check }}
        uses: actions/github-script@v7
        env:
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        with:
          script: |
            const required = ['ci', 'unit-integration', 'e2e', 'security'];
            const timeoutMs = 10 * 60 * 1000;
            const pollMs = 15 * 1000;
            const started = Date.now();
            const targetSha = process.env.TARGET_SHA;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            while (true) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: targetSha,
                per_page: 100
              });

              const byName = new Map();
              for (const run of data.check_runs) {
                if (!required.includes(run.name)) continue;
                const prev = byName.get(run.name);
                if (!prev || run.id > prev.id) byName.set(run.name, run);
              }

              const missing = required.filter((name) => !byName.has(name));
              const pending = [];
              const failed = [];

              for (const name of required) {
                const run = byName.get(name);
                if (!run) continue;
                if (run.status !== 'completed') {
                  pending.push(`${name} (${run.status})`);
                  continue;
                }
                if (run.conclusion !== 'success') {
                  failed.push(`${name} (${run.conclusion})`);
                }
              }

              if (failed.length) {
                core.setFailed(`Required checks failed for ${targetSha}: ${failed.join(', ')}`);
                return;
              }

              if (!missing.length && !pending.length) {
                core.info(`All required checks passed for ${targetSha}.`);
                return;
              }

              if (Date.now() - started > timeoutMs) {
                core.setFailed(
                  `Timed out waiting for required checks. Missing: ${missing.join(', ') || 'none'}. Pending: ${
                    pending.join(', ') || 'none'
                  }.`
                );
                return;
              }

              core.info(
                `Waiting for checks on ${targetSha}. Missing: ${missing.join(', ') || 'none'}. Pending: ${
                  pending.join(', ') || 'none'
                }.`
              );
              await sleep(pollMs);
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify quality gates
        run: |
          npm run lint
          npm run typecheck
          npm run build

      - name: Pull Vercel project settings (production env)
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
