name: live-guardrails

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 * * *'

concurrency:
  group: live-guardrails-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify live domain + CSP guardrails
        run: npm run verify:live

      - name: Verify live asset budgets
        run: npm run budget:live
