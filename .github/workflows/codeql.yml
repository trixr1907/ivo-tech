name: codeql

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '30 5 * * 1'

jobs:
  analyze:
    name: Analyze
    # Default-on. Set repository variable DISABLE_CODEQL=true only as temporary emergency switch.
    if: ${{ vars.DISABLE_CODEQL != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
