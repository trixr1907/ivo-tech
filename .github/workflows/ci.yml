name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Must match src/env.ts production guard (Next collectStaticData / sitemap).
      NEXT_PUBLIC_SITE_URL: https://ivo-tech.com
      NEXT_PUBLIC_APP_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint i18n consistency
        run: npm run lint:i18n

      - name: Typecheck
        run: npm run typecheck

      - name: Verify analytics map consistency (strict)
        run: npm run analytics:verify:map:strict

      - name: Build
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run budget:bundle
